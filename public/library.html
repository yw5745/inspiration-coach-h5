<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>文案库 · 灵感教练</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .container { padding: 16px 0 80px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; padding: 80px 32px; text-align: center; }
  .empty-icon { font-size: 56px; margin-bottom: 14px; }
  .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .empty-hint { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
  .empty-state .btn-primary { padding: 12px 36px; }
  .script-item { cursor: pointer; position: relative; }
  .script-item:active { background: #f8f8ff; }
  .script-item .delete-action { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 8px; z-index: 2; }
  .load-more { display: flex; justify-content: center; padding: 20px; }
  .load-more-text { font-size: 14px; color: var(--primary); cursor: pointer; }
  .load-more-text.no-more { color: var(--text-muted); cursor: default; }
</style>
</head>
<body>

<div class="nav-bar">📝 文案库</div>

<div class="container">
  <div id="emptyView" class="empty-state" style="display:none">
    <span class="empty-icon">📝</span>
    <span class="empty-title">还没有保存的文案</span>
    <span class="empty-hint">去首页输入灵感，让教练帮你生成第一条文案吧</span>
    <button class="btn-primary" onclick="window.location.href='index.html'">开始创作</button>
  </div>

  <div id="scriptList"></div>
  <div id="loadMore" class="load-more" style="display:none">
    <span class="load-more-text" id="loadMoreText">加载更多...</span>
  </div>
</div>

<!-- 底部 Tab 栏 -->
<div class="tab-bar">
  <a class="tab-item" href="index.html">
    <span class="tab-icon">💡</span>灵感
  </a>
  <a class="tab-item active" href="library.html">
    <span class="tab-icon">📝</span>文案库
  </a>
  <a class="tab-item" href="profile.html">
    <span class="tab-icon">👤</span>我的
  </a>
</div>

<script src="js/constants.js"></script>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script>
var page = 1;
var hasMore = true;

var emptyView = document.getElementById('emptyView');
var scriptListEl = document.getElementById('scriptList');
var loadMore = document.getElementById('loadMore');
var loadMoreText = document.getElementById('loadMoreText');

loadScripts(true);

function loadScripts(refresh) {
  var p = refresh ? 1 : page;
  var result = listScripts(p);

  if (result.scripts.length === 0 && refresh) {
    emptyView.style.display = 'flex';
    return;
  }

  emptyView.style.display = 'none';

  var scripts = result.scripts;
  hasMore = scripts.length >= 20; // 简化：假设每页20条
  page = p + 1;

  if (refresh) scriptListEl.innerHTML = '';

  scripts.forEach(function(s) {
    var div = document.createElement('div');
    div.className = 'script-card script-item';
    div.style.position = 'relative';

    var formatLabel = s.format === 'douyin' ? '抖音' : (s.format === 'kuaishou' ? '快手' : (s.format === 'wechat_channel' ? '视频号' : '通用'));

    div.innerHTML =
      '<div class="script-card-header">' +
        '<span class="script-card-title">' + escapeHtml(s.title) + '</span>' +
        '<span class="script-card-tag">' + formatLabel + '</span>' +
      '</div>' +
      '<div class="script-card-preview">' + escapeHtml(s.content || '') + '</div>' +
      '<div class="script-card-footer">' +
        '<button class="script-card-action">🗑 删除</button>' +
      '</div>';

    // 点击查看
    div.addEventListener('click', function(e) {
      if (e.target.classList.contains('script-card-action')) return; // delete button
      App.setParam('scriptId', s.id);
      window.location.href = 'preview.html';
    });

    // 删除
    div.querySelector('.script-card-action').addEventListener('click', function(e) {
      e.stopPropagation();
      App.showModal('确认删除', '删除后无法恢复', function() {
        deleteScript(s.id);
        div.remove();
        if (scriptListEl.children.length === 0) {
          emptyView.style.display = 'flex';
        }
        App.showToast('已删除', 'success');
      });
    });

    scriptListEl.appendChild(div);
  });

  if (hasMore) {
    loadMore.style.display = 'flex';
    loadMoreText.textContent = '加载更多...';
    loadMoreText.className = 'load-more-text';
    loadMoreText.onclick = function() { loadScripts(false); };
  } else if (result.total > 0) {
    loadMore.style.display = 'flex';
    loadMoreText.textContent = '— 已经到底了 —';
    loadMoreText.className = 'load-more-text no-more';
    loadMoreText.onclick = null;
  }
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
</script>
</body>
</html>
